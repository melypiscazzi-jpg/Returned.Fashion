  <html>

<title>Returned Fashion</title>

<h1>Returned Fashion 
<img src="https://assets.codepen.io/16300842/internal/avatars/users/default.png" height="80">
</h1>

<h2>Welcome to the Secondhandshop</h2>
<input id="search" placeholder="search for...">


<button id="cartBtn">Your Cart 🛒</button>
<div id="paypal-button-container"></div>
  <ul id="cart"></ul>
<div id="paypal-button-container"></div>
<div class="categories">
<button class="category" data-category="football">Football⚽</button>
<button class="category" data-category="tops">Tops👕</button>
<button class="category" data-category="pants">Pants👖</button>
<button class="category" data-category="jackets">Jackets🧥</button>
<button class="category" data-category="shoes">Shoes👟</button>
<button class="category" data-category="accessories">Accessories🧢</button>
<button class="category" data-category="jewellery">Jewellery💍</button>

<script src="https://www.paypal.com/sdk/js?client-id=sb"></script>  
 <div id="paypal-button-container"></div>
  <script>
paypal.Buttons({
createOrder: function(data, actions) {
return actions.order.create({
purchase_units: [{
amount: {
value: '10.00'
}
}]
});
},
onApprove: function(data, actions) {
return actions.order.capture().then(function(details) {
alert('Zahlung erfolgreich von ' + details.payer.name.given_name);
});
}
}).render('#paypal-button-container');
</script> 
  <div id="products"></div>
<link rel="stylesheet" href="style.css">
<script src="script.js"></script> 
  
  
</html>
